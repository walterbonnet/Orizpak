<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="arrozGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAE3D2" />
      <stop offset="100%" stop-color="#C29B78" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBF9F6" />
      <stop offset="100%" stop-color="#ECE5D8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />

  <!-- Shadow -->
  <path d="M 120,330 L 160,330 L 180,100 L 140,100 Z" fill="#2A2A2A" fill-opacity="0.04" filter="blur(3px)" />
  <path d="M 220,330 L 260,330 L 280,100 L 240,100 Z" fill="#2A2A2A" fill-opacity="0.04" filter="blur(3px)" />

  <!-- Fork (Tenedor) on Left -->
  <g transform="translate(-10, 0)">
    <!-- Handle -->
    <rect x="150" y="180" width="12" height="150" rx="6" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1" />
    <!-- Head -->
    <path d="M 140,100 L 172,100 L 172,180 L 140,180 Z" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1" />
    <!-- Tines (Dientes) -->
    <line x1="148" y1="100" x2="148" y2="140" stroke="#FBF9F6" stroke-width="3" stroke-linecap="round" />
    <line x1="156" y1="100" x2="156" y2="140" stroke="#FBF9F6" stroke-width="3" stroke-linecap="round" />
    <line x1="164" y1="100" x2="164" y2="140" stroke="#FBF9F6" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Knife (Cuchillo) on Right -->
  <g transform="translate(40, 0)">
    <!-- Handle -->
    <rect x="180" y="180" width="12" height="150" rx="6" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1" />
    <!-- Blade -->
    <path d="M 180,90 Q 200,90 192,180 L 180,180 Z" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1" />
  </g>

  <!-- Fiber dots textures -->
  <circle cx="145" cy="220" r="0.8" fill="#6D7550" opacity="0.4" />
  <circle cx="225" cy="240" r="0.8" fill="#6D7550" opacity="0.4" />
  <circle cx="147" cy="290" r="1" fill="#B67B55" opacity="0.4" />
  <circle cx="227" cy="290" r="1" fill="#B67B55" opacity="0.4" />
</svg>
