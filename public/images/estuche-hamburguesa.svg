<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="clamshellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EAE3D2" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECE5D8" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />
  <!-- Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250 M 0,300 L 400,300 M 0,350 L 400,350" stroke="#2A2A2A" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400" stroke="#2A2A2A" stroke-opacity="0.03" stroke-width="1" />

  <!-- Shadow -->
  <rect x="110" y="220" width="180" height="110" rx="20" fill="#2A2A2A" fill-opacity="0.1" filter="blur(8px)" />

  <!-- Clamshell Bottom Half -->
  <path d="M 120,200 L 280,200 L 260,300 L 140,300 Z" fill="url(#clamshellGrad)" stroke="#DFD7C7" stroke-width="1" />
  
  <!-- Clamshell Top Half (Semi-Open / Hinged) -->
  <path d="M 120,200 L 280,200 L 290,120 L 110,120 Z" fill="#F8F6F0" stroke="#DFD7C7" stroke-width="1.5" />
  
  <!-- Outer Rim Lip / Locking Clip -->
  <path d="M 180,120 L 220,120 L 215,130 L 185,130 Z" fill="#B67B55" />

  <!-- Molded Grooves/Texture (Sugarcane pulp texture lines) -->
  <line x1="140" y1="135" x2="155" y2="185" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />
  <line x1="260" y1="135" x2="245" y2="185" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />
  <line x1="200" y1="135" x2="200" y2="185" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />
  
  <line x1="160" y1="215" x2="175" y2="285" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />
  <line x1="240" y1="215" x2="225" y2="285" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />
  <line x1="200" y1="215" x2="200" y2="285" stroke="#2A2A2A" stroke-opacity="0.08" stroke-width="2" />

  <!-- Green Leaf Print logo on top -->
  <circle cx="200" cy="160" r="14" fill="#6D7550" fill-opacity="0.2" />
  <path d="M 195,163 C 195,153 205,153 205,153 C 205,153 205,163 195,163 Z" fill="#6D7550" />
</svg>
