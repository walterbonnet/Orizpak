<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="arrozGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EAE3D2" />
      <stop offset="50%" stop-color="#F4EFE6" />
      <stop offset="100%" stop-color="#C29B78" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBF9F6" />
      <stop offset="100%" stop-color="#ECE5D8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />

  <!-- Straw Shadow -->
  <line x1="165" y1="330" x2="255" y2="70" stroke="#2A2A2A" stroke-width="12" stroke-linecap="round" stroke-opacity="0.04" />

  <!-- Straw Body (Diagonal Straw) -->
  <line x1="160" y1="330" x2="250" y2="70" stroke="url(#arrozGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Spiral Bio Strip Lines (Editorial Rice husk detail) -->
  <line x1="185" y1="250" x2="190" y2="238" stroke="#6D7550" stroke-width="1.5" opacity="0.6" />
  <line x1="205" y1="190" x2="210" y2="178" stroke="#6D7550" stroke-width="1.5" opacity="0.6" />
  <line x1="225" y1="130" x2="230" y2="118" stroke="#6D7550" stroke-width="1.5" opacity="0.6" />

  <!-- Textured dots -->
  <circle cx="178" cy="270" r="0.8" fill="#B67B55" opacity="0.5" />
  <circle cx="218" cy="150" r="0.8" fill="#B67B55" opacity="0.5" />
</svg>
