<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="arrozGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAE3D2" />
      <stop offset="100%" stop-color="#C29B78" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBF9F6" />
      <stop offset="100%" stop-color="#ECE5D8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />
  
  <!-- Subtle Rice husk dots/textures inside the background -->
  <circle cx="50" cy="80" r="1.5" fill="#2A2A2A" opacity="0.05" />
  <circle cx="340" cy="120" r="1.5" fill="#2A2A2A" opacity="0.05" />
  <circle cx="120" cy="320" r="1.5" fill="#2A2A2A" opacity="0.05" />
  <circle cx="280" cy="290" r="1.5" fill="#2A2A2A" opacity="0.05" />

  <!-- Cup Shadow -->
  <ellipse cx="200" cy="335" rx="60" ry="12" fill="#2A2A2A" fill-opacity="0.06" />

  <!-- Cup Body -->
  <path d="M 140,140 L 260,140 L 240,320 L 160,320 Z" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1.5" />
  
  <!-- Cup Rim Lip -->
  <ellipse cx="200" cy="140" rx="60" ry="12" fill="#F4EFE6" stroke="#C29B78" stroke-width="1.5" />
  <ellipse cx="200" cy="140" rx="54" ry="8" fill="#D3C9B3" opacity="0.5" />

  <!-- Textured fiber dots on the cup to simulate Rice Husk -->
  <circle cx="170" cy="200" r="1" fill="#6D7550" opacity="0.4" />
  <circle cx="230" cy="250" r="1.5" fill="#6D7550" opacity="0.4" />
  <circle cx="185" cy="280" r="1.2" fill="#6D7550" opacity="0.4" />
  <circle cx="215" cy="180" r="1" fill="#6D7550" opacity="0.4" />
  <circle cx="200" cy="220" r="1.2" fill="#B67B55" opacity="0.5" />
  <circle cx="160" cy="260" r="1.5" fill="#B67B55" opacity="0.5" />
  <circle cx="240" cy="210" r="1.2" fill="#B67B55" opacity="0.5" />
  
  <!-- Engraved/Laser Brand stamp on cup -->
  <circle cx="200" cy="235" r="22" fill="none" stroke="#2A2A2A" stroke-width="1" stroke-opacity="0.15" />
  <path d="M 194,238 C 194,228 206,228 206,228 C 206,228 206,238 194,238 Z" fill="#2A2A2A" fill-opacity="0.15" />
  <text x="200" y="278" font-family="Space Grotesk, sans-serif" font-size="8" font-weight="bold" fill="#2A2A2A" fill-opacity="0.25" letter-spacing="1" text-anchor="middle">ORIZPAK</text>
</svg>
