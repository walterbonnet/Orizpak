<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="kraftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DFD7C7" />
      <stop offset="100%" stop-color="#B67B55" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECE5D8" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />
  <!-- Grid -->
  <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250 M 0,300 L 400,300 M 0,350 L 400,350" stroke="#2A2A2A" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400" stroke="#2A2A2A" stroke-opacity="0.03" stroke-width="1" />
  
  <!-- Handles -->
  <path d="M 160,140 Q 200,60 240,140" fill="none" stroke="#6D7550" stroke-width="8" stroke-linecap="round" />
  <path d="M 170,140 Q 200,75 230,140" fill="none" stroke="#2A2A2A" stroke-opacity="0.2" stroke-width="4" stroke-linecap="round" />

  <!-- Bag Body -->
  <path d="M 120,140 L 280,140 L 260,340 L 140,340 Z" fill="url(#kraftGrad)" filter="drop-shadow(0px 10px 20px rgba(42, 42, 42, 0.15))" />
  
  <!-- Bag Fold lines / Industrial Design Details -->
  <path d="M 140,340 L 200,310 L 260,340" fill="none" stroke="#2A2A2A" stroke-opacity="0.1" stroke-width="3" />
  <line x1="200" y1="140" x2="200" y2="310" stroke="#2A2A2A" stroke-opacity="0.05" stroke-width="2" />
  
  <!-- Logo on Bag -->
  <circle cx="200" cy="220" r="30" fill="#6D7550" />
  <!-- Leaf icon inside circle -->
  <path d="M 190,230 C 190,210 210,210 210,210 C 210,210 210,230 190,230 Z" fill="#FFFFFF" />
  <path d="M 210,210 L 195,225" stroke="#FFFFFF" stroke-width="2" />
  
  <!-- Stamp text -->
  <text x="200" y="280" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="bold" fill="#2A2A2A" letter-spacing="2" text-anchor="middle">ORIZPAK ECO</text>
</svg>
