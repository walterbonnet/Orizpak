<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="arrozGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAE3D2" />
      <stop offset="100%" stop-color="#C29B78" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBF9F6" />
      <stop offset="100%" stop-color="#ECE5D8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="24" />

  <!-- Shadow -->
  <ellipse cx="200" cy="270" rx="130" ry="25" fill="#2A2A2A" fill-opacity="0.08" />

  <!-- Outer Plate Rim -->
  <ellipse cx="200" cy="250" rx="130" ry="40" fill="url(#arrozGrad)" stroke="#C29B78" stroke-width="1.5" />
  
  <!-- Inner Plate base -->
  <ellipse cx="200" cy="253" rx="100" ry="28" fill="#F4EFE6" stroke="#DFD7C7" stroke-width="1" />
  <ellipse cx="200" cy="253" rx="90" ry="22" fill="#E2D9C2" fill-opacity="0.3" />

  <!-- Textured fiber dots to simulate Rice Husk -->
  <circle cx="110" cy="240" r="1.2" fill="#6D7550" opacity="0.35" />
  <circle cx="290" cy="250" r="1.5" fill="#6D7550" opacity="0.35" />
  <circle cx="160" cy="265" r="1" fill="#B67B55" opacity="0.4" />
  <circle cx="240" cy="245" r="1.2" fill="#B67B55" opacity="0.4" />
  <circle cx="200" cy="260" r="1.5" fill="#2A2A2A" opacity="0.1" />

  <!-- Engraved Leaf logo inside plate center -->
  <path d="M 195,255 C 195,247 205,247 205,247 C 205,247 205,255 195,255 Z" fill="#2A2A2A" fill-opacity="0.12" />
</svg>
